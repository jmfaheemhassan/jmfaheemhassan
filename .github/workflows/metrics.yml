name: Metrics
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: তোমার_ইউজারনেম
          template: classic
          base: header, activity, community, repositories

          # Contribution calendar + streak
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Commit activity per time/day
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_from: 200
          plugin_habits_days: 14

          # Top / most used languages
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_details: percentage

          # Mastered technologies (skill icons)
          plugin_stack: yes
          plugin_stack_tags: yes

          # PageSpeed Insights (দরকার হলে নিজের সাইট URL দাও)
          # plugin_pagespeed: yes
          # plugin_pagespeed_detailed: yes
          # plugin_pagespeed_url: https://jmfaheemhassan.io
